services:
  - type: web
    name: mailstorm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install; npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        value: https://mail.google.com,https://your-vercel-domain.vercel.app
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REDIRECT_URI
        value: https://your-render-service.onrender.com/api/auth/google/callback
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_SENDER_EMAIL
        sync: false
